services:

  # ── Step 0: Data Pipeline (runs once, generates Parquet files) ────────────────
  pipeline:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: crypto-hub-pipeline
    command: ["python", "scripts/run_all.py"]
    volumes:
      - ./data:/app/data          # writable — pipeline writes Parquet here
      - ./scripts:/app/scripts:ro
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    networks:
      - crypto-net
    # Only run if processed files are absent; exits 0 on success
    restart: "no"

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: crypto-hub-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - API_RELOAD=false
    volumes:
      - ./data:/app/data:ro       # read-only after pipeline ran
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 5
    depends_on:
      pipeline:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - crypto-net

  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.dashboard
    container_name: crypto-hub-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
      - ./config:/app/config:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crypto-net

  # ── Redis Cache ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crypto-hub-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - crypto-net

networks:
  crypto-net:
    driver: bridge

volumes:
  redis-data:
