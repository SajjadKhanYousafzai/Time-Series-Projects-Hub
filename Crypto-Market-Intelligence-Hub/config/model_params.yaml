# Model Hyperparameters Configuration
# ─────────────────────────────────────
# All model training parameters are centralised here.
# Override individual values via environment variables when running experiments.

general:
  train_test_split: 0.8          # fraction of data used for training
  random_seed: 42
  forecast_horizon: 30           # days ahead to forecast
  target_column: "close"
  date_column: "date"
  asset_column: "asset"

# ── ARIMA ────────────────────────────────────────────────────────────────────
arima:
  p_range: [0, 1, 2, 3]          # AR order candidates for grid search
  d: 1                           # differencing order (unit root confirmed)
  q_range: [0, 1, 2, 3]          # MA order candidates
  information_criterion: "aic"   # "aic" | "bic"
  max_iter: 200
  default_assets: ["bitcoin", "ethereum", "solana"]

# ── Prophet ──────────────────────────────────────────────────────────────────
prophet:
  seasonality_mode: "multiplicative"   # "additive" | "multiplicative"
  yearly_seasonality: true
  weekly_seasonality: true
  daily_seasonality: false
  changepoint_prior_scale: 0.05
  seasonality_prior_scale: 10.0
  interval_width: 0.80              # confidence interval
  n_forecasts: 30
  mcmc_samples: 0                   # 0 = MAP estimation (fast)

# ── LSTM ─────────────────────────────────────────────────────────────────────
lstm:
  sequence_length: 60               # look-back window (days)
  units: [128, 64]                  # stacked LSTM layer sizes
  dropout_rate: 0.2
  batch_norm: true
  dense_units: 32
  activation: "tanh"
  recurrent_activation: "sigmoid"
  optimizer: "adam"
  learning_rate: 0.001
  loss: "mse"
  batch_size: 32
  epochs: 100
  early_stopping:
    monitor: "val_loss"
    patience: 10
    restore_best_weights: true
  reduce_lr:
    monitor: "val_loss"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

# ── GRU ──────────────────────────────────────────────────────────────────────
gru:
  sequence_length: 60
  units: [128, 64]
  dropout_rate: 0.2
  batch_norm: true
  dense_units: 32
  activation: "tanh"
  recurrent_activation: "sigmoid"
  optimizer: "adam"
  learning_rate: 0.001
  loss: "mse"
  batch_size: 32
  epochs: 100
  early_stopping:
    monitor: "val_loss"
    patience: 10
    restore_best_weights: true
  reduce_lr:
    monitor: "val_loss"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

# ── Feature Engineering ───────────────────────────────────────────────────────
features:
  rolling_windows: [7, 14, 30, 90]   # days for rolling statistics
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_window: 20
  bollinger_std: 2.0
  atr_period: 14

# ── Evaluation Metrics ────────────────────────────────────────────────────────
evaluation:
  metrics: ["mae", "rmse", "mape", "r2"]
  primary_metric: "rmse"
