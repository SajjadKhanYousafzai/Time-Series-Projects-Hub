version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s  %(levelname)-8s  %(name)s — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  brief:
    format: "%(asctime)s  %(levelname)-8s  %(message)s"
    datefmt: "%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: brief
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 10485760     # 10 MB
    backupCount: 5
    encoding: utf8

loggers:
  src:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  statsmodels:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
